<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="style/browser@4.js"></script>
    <link rel="stylesheet" href="style/daisyui@5.css">
    <link defer="" media="all" onload="this.media='all'" rel="stylesheet"
        href="https://site-assets.fontawesome.com/releases/v7.2.0/css/fontawesome.css">
    <link defer="" media="all" onload="this.media='all'" rel="stylesheet"
        href="https://site-assets.fontawesome.com/releases/v7.2.0/css/solid.css">

<body class="min-h-screen max-w-md bg-base-200 p-3 m-auto">

    <header>
        <section class="mx-auto">
            <div class="navbar bg-base-100 p-3 py-4 shadow-sm">
                <div class="flex-none">
                    <div class="  ">

                        <div>
                            <img class="" width="100" src="assets/Logo-full.png" alt="">
                        </div>
                    </div>
                </div>
                <div class="flex-1 ms-2">
                    <div class="mx-3">
                        <p id="amount" class="font-bold md:text-lg sm:text-lg text-[25px] ">$45000</p>
                        <p>Available</p>
                    </div>
                </div>
                <div class="flex-none">
                    <button class="btn btn-wide btn-square bg-base-300 px-3 btn-soft">
                        <i class="fa-solid fa-arrow-left-from-bracket"></i>
                        Log Out

                </div>
            </div>
        </section>
    </header>

    <section class="mt-10 p-5">
        <section>
            <h1 class="md:text-3xl lg:text-4xl sm:text-2xl text-3xl font-bold">Welcome To Pay<span class="text-primary font-bold">oo</span></h1>

        </button>
        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
            <img src="assets/opt-4.png" alt="">
            <p>Get Bonus </p>
        </button>
        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
            <img src="assets/opt-5.png" alt="">
            <p>Pay Bill </p>
        </button>
        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
